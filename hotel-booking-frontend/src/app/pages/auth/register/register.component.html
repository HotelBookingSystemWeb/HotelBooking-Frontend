<div class="auth-box">
  <h2>Register</h2>

  <input [(ngModel)]="data.name" placeholder="Name" />
  <input [(ngModel)]="data.email" placeholder="Email" />
  <input [(ngModel)]="data.password" type="password" placeholder="Password" />

  <button (click)="register()">Register</button>
<p class="switch">
  Already have an account?
  <a routerLink="/login">Login</a>
</p>
</div>
